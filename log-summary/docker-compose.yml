services:
  log-summary:
    build:
      context: ..
      dockerfile: log-summary/Dockerfile
    container_name: firewall-log-summary
    restart: unless-stopped
    env_file:
      - .env
      - ../.env
    environment:
      - SUMMARY_LOG_PATH=${SUMMARY_LOG_PATH}
      - SUMMARY_OUTPUT_DIR=${SUMMARY_OUTPUT_DIR}
      - SUMMARY_TOP_N=${SUMMARY_TOP_N}
      - SUMMARY_WINDOW_MINUTES=${SUMMARY_WINDOW_MINUTES}
      - SUMMARY_POLL_SECONDS=${SUMMARY_POLL_SECONDS}
      - SUMMARY_RUN_MODE=${SUMMARY_RUN_MODE}
      - SUMMARY_STATUS_PATH=${SUMMARY_STATUS_PATH}
      - SUMMARY_HEALTHCHECK_MAX_EMPTY_CYCLES=${SUMMARY_HEALTHCHECK_MAX_EMPTY_CYCLES}
    volumes:
      - ${SUMMARY_LOG_MOUNT_DIR}:${SUMMARY_LOG_MOUNT_DIR}:ro
      - ./output:/output
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,os,sys; p=os.getenv('SUMMARY_STATUS_PATH','/output/summary.status.json'); m=int(os.getenv('SUMMARY_HEALTHCHECK_MAX_EMPTY_CYCLES','10')); d=json.load(open(p)); sys.exit(0 if int(d.get('consecutive_empty_cycles',0)) <= m else 1)\"",
        ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 120s

  log-reports:
    build:
      context: ..
      dockerfile: log-summary/Dockerfile
    container_name: firewall-log-reports
    restart: unless-stopped
    env_file:
      - .env
      - ../.env
    environment:
      - LOGFILE=${SUMMARY_LOG_PATH}
      - REPORTS_OUTPUT_DIR=${REPORTS_OUTPUT_DIR:-/output/reports}
      - REPORTS_ANALYSIS_TYPE=${REPORTS_ANALYSIS_TYPE:-all}
      - SUMMARY_POLL_SECONDS=${SUMMARY_POLL_SECONDS}
    volumes:
      - ${SUMMARY_LOG_MOUNT_DIR}:${SUMMARY_LOG_MOUNT_DIR}:ro
      - ./output:/output
    entrypoint:
      - /bin/sh
      - -lc
      - |
        while true; do
          mkdir -p "${REPORTS_OUTPUT_DIR}" && \
          python /app/iptable.loggin.py \
            --env-file '' \
            --output-dir "${REPORTS_OUTPUT_DIR}" \
            --analysis-type "${REPORTS_ANALYSIS_TYPE}";
          sleep "${SUMMARY_POLL_SECONDS}";
        done
